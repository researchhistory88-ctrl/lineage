<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本通史 家系図 — 皇室・源氏・徳川</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #f7f2e8;
      --bg2: #efe8d8;
      --text: #2c2014;
      --text2: #5a4a3a;
      --gold: #b8963e;
      --gold2: #d4af5a;
      --red: #a83a3a;
      --blue: #3a5a7a;
      --green: #5a7a4a;
      --line: #8a7a6a;
      --node-bg: #faf6ee;
      --node-border: #c8b89a;
      --panel-bg: #faf8f2;
      --shogun-bg: #fdf6e3;
      --shogun-border: #c4a030;
      --female-bg: #faf0f0;
      --adopted-border: #888;
      --font: 'Noto Serif JP', serif;
    }

    [data-theme="kobun"] {
      --bg: #3a3228;
      --bg2: #2a2520;
      --text: #d4c8a8;
      --text2: #a09070;
      --gold: #c4a040;
      --gold2: #a08030;
      --red: #c06040;
      --blue: #6090b0;
      --green: #80a060;
      --line: #706050;
      --node-bg: #4a3e30;
      --node-border: #6a5a40;
      --panel-bg: #3a3228;
      --shogun-bg: #504020;
      --shogun-border: #c4a030;
      --female-bg: #4a3038;
      --adopted-border: #706050;
    }

    [data-theme="modern"] {
      --bg: #f0f4f8;
      --bg2: #e2e8f0;
      --text: #1a202c;
      --text2: #4a5568;
      --gold: #d69e2e;
      --gold2: #ecc94b;
      --red: #e53e3e;
      --blue: #3182ce;
      --green: #38a169;
      --line: #a0aec0;
      --node-bg: #fff;
      --node-border: #e2e8f0;
      --panel-bg: #fff;
      --shogun-bg: #fffff0;
      --shogun-border: #d69e2e;
      --female-bg: #fff5f5;
      --adopted-border: #a0aec0;
      --font: 'Noto Serif JP', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--bg2);
      border-bottom: 2px solid var(--gold);
      z-index: 10
    }

    .logo {
      font-size: 1.2em;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .controls select,
    .controls input {
      font-family: var(--font);
      padding: 4px 8px;
      border: 1px solid var(--node-border);
      border-radius: 4px;
      background: var(--node-bg);
      color: var(--text);
      font-size: 0.85em
    }

    #search-input {
      width: 180px
    }

    #filter-bar {
      display: flex;
      gap: 6px;
      padding: 6px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--node-border);
      flex-wrap: wrap;
      z-index: 10
    }

    .attr-chip {
      font-family: var(--font);
      font-size: 0.75em;
      padding: 3px 10px;
      border: 1px solid var(--node-border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: all .2s
    }

    .attr-chip.active {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold)
    }

    #tree-container {
      flex: 1;
      position: relative;
      overflow: hidden
    }

    #tree-svg {
      width: 100%;
      height: 100%;
      cursor: grab
    }

    #tree-svg:active {
      cursor: grabbing
    }

    #detail-panel {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: var(--bg);
      border-left: 1px solid var(--node-border);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    #detail-panel.active {
      transform: translateX(0);
    }

    .detail-name {
      font-size: 1.3em;
      font-weight: 700;
      margin: 8px 0;
      color: var(--gold);
      writing-mode: vertical-rl;
      height: auto;
      min-height: 100px
    }

    .detail-section {
      margin: 12px 0
    }

    .detail-section h3 {
      font-size: 0.85em;
      color: var(--text2);
      border-bottom: 1px solid var(--node-border);
      padding-bottom: 4px;
      margin-bottom: 6px
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 0.85em
    }

    .detail-label {
      color: var(--text2)
    }

    .spouse-item {
      padding: 4px 8px;
      margin: 3px 0;
      border-radius: 4px;
      font-size: 0.8em
    }

    .spouse-seishitsu {
      background: rgba(184, 150, 62, 0.15);
      border-left: 3px solid var(--gold)
    }

    .spouse-sokushitsu {
      background: rgba(100, 100, 100, 0.1);
      border-left: 3px solid var(--line)
    }

    #close-panel {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: var(--text2)
    }

    .detail-name {
      font-size: 1.3em;
      font-weight: 700;
      margin: 8px 0;
      color: var(--gold);
      writing-mode: vertical-rl;
      height: auto;
      min-height: 100px
    }

    .detail-section {
      margin: 12px 0
    }

    .detail-section h3 {
      font-size: 0.85em;
      color: var(--text2);
      border-bottom: 1px solid var(--node-border);
      padding-bottom: 4px;
      margin-bottom: 6px
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 0.85em
    }

    .detail-label {
      color: var(--text2)
    }

    .spouse-item {
      padding: 4px 8px;
      margin: 3px 0;
      border-radius: 4px;
      font-size: 0.8em
    }

    .spouse-seishitsu {
      background: rgba(184, 150, 62, 0.15);
      border-left: 3px solid var(--gold)
    }

    .spouse-sokushitsu {
      background: rgba(100, 100, 100, 0.1);
      border-left: 3px solid var(--line)
    }

    .node-group {
      cursor: pointer
    }

    .node-rect {
      fill: var(--node-bg);
      stroke: var(--node-border);
      stroke-width: 1.5;
      rx: 6;
      transition: all .2s
    }

    .node-group:hover .node-rect {
      filter: brightness(0.95);
      stroke: var(--gold)
    }

    .node-shogun .node-rect {
      fill: var(--shogun-bg);
      stroke: var(--shogun-border);
      stroke-width: 2.5
    }

    .node-female .node-rect {
      fill: var(--female-bg)
    }

    .node-adopted .node-rect {
      stroke-dasharray: 6 3;
      stroke: var(--adopted-border)
    }

    .shogun-badge {
      font-size: 9px;
      fill: #fff;
      text-anchor: middle
    }

    .shogun-badge-bg {
      fill: var(--gold);
      rx: 3
    }

    .emperor-badge-bg {
      fill: #7B2D8E;
      rx: 3
    }

    .kamakura-badge-bg {
      fill: #1a5276;
      rx: 3
    }

    .muromachi-badge-bg {
      fill: #1e6e3e;
      rx: 3
    }

    .nanke-badge-bg {
      fill: #d35400;
      rx: 3
    }

    .hokke-badge-bg {
      fill: #2980b9;
      rx: 3
    }

    .shikike-badge-bg {
      fill: #27ae60;
      rx: 3
    }

    .kyoke-badge-bg {
      fill: #8e44ad;
      rx: 3
    }

    .node-name {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      fill: var(--text);
      text-anchor: middle
    }

    .node-attr {
      font-family: var(--font);
      font-size: 10px;
      fill: var(--text2);
      text-anchor: middle
    }

    .link-real {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.5
    }

    .link-adopted {
      fill: none;
      stroke: var(--adopted-border);
      stroke-width: 1.5;
      stroke-dasharray: 6 3
    }

    .link-marriage-sei {
      fill: none;
      stroke: var(--gold);
      stroke-width: 2
    }

    .link-marriage-soku {
      fill: none;
      stroke: var(--line);
      stroke-width: 1;
      stroke-dasharray: 4 2
    }

    .spouse-rect {
      fill: var(--node-bg);
      stroke: var(--node-border);
      stroke-width: 1;
      rx: 4;
      opacity: 0.9
    }

    .spouse-name {
      font-family: var(--font);
      font-size: 10px;
      fill: var(--text2);
      text-anchor: middle
    }

    .collapse-btn {
      fill: var(--gold);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font)
    }

    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--panel-bg);
      border: 1px solid var(--node-border);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.75em;
      z-index: 10;
      opacity: 0.9
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0
    }

    .legend-line {
      width: 30px;
      height: 0;
      display: inline-block
    }

    .highlight-node .node-rect {
      stroke: var(--red) !important;
      stroke-width: 3 !important
    }

    .search-results {
      position: absolute;
      background: var(--panel-bg);
      border: 1px solid var(--node-border);
      border-radius: 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 30;
      font-size: 0.85em
    }

    .search-item {
      padding: 6px 12px;
      cursor: pointer
    }

    .search-item:hover {
      background: var(--bg2)
    }
  </style>
</head>

        </svg> 側室</div>
      <div class="legend-item"><svg width="16" height="16">
          <rect width="14" height="14" x="1" y="1" fill="var(--shogun-bg)" stroke="var(--shogun-border)"
            stroke-width="2" rx="3" />
        </svg> 将軍</div>
    </div>
  </div>

        const cy = hasBadge ? 55 : 45;
        if (d.data.b || d.data.d) {
          const b = d.data.b ? (d.data.b < 0 ? 'BC' + Math.abs(d.data.b) : d.data.b) : '?';
          const dd = d.data.d ? (d.data.d < 0 ? 'BC' + Math.abs(d.data.d) : d.data.d) : '?';
          d3.select(this).append('text').attr('class', 'node-attr attr-years').attr('x', 0).attr('y', cy).text(b + '-' + dd);
        }
      });

      nodeEnter.append('svg:title').text(d => d.data.name + (d.data.title ? ' (' + d.data.title + ')' : ''));

      nodeEnter.filter(d => d._ch || d.children).append('circle')
        .attr('class', 'expand-indicator').attr('cx', 0).attr('cy', 60).attr('r', 4);

      const spNode = nodeEnter.selectAll('g.sp').data(d => d.data.sp || []).enter().append('g')
        .attr('transform', (d, i) => `translate(${spW}, ${i * 45 - 20})`);

      spNode.append('rect').attr('class', d => d.t === '正室' ? 'spouse-rect main-wife' : 'spouse-rect').attr('x', -10).attr('y', -30).attr('width', 20).attr('height', 60).attr('rx', 3);
      spNode.append('text').attr('class', 'spouse-name').attr('text-anchor', 'middle').attr('x', 0).attr('y', -18)
        .selectAll('tspan').data(d => d.name.split('')).enter().append('tspan').attr('x', 0).attr('dy', (d, i) => i === 0 ? 0 : 11).text(d => d);

      nodeUpdate.classed('highlight-node', d => state.selected && state.selected.id === d.data.id);

      nodeUpdate.select('.expand-indicator').attr('fill', d => d.children ? 'var(--node-bg)' : 'var(--node-border)');

      const nodeExit = node.exit().transition().duration(dur)
        .attr('transform', d => `translate(${o.x},${o.y})`).attr('opacity', 0).remove();

      const link = g.selectAll('path.link.tree-' + idx).data(links, d => d.target.data.id);
      const linkEnter = link.enter().insert('path', 'g')
        .attr('class', d => d.target.data.adopted ? 'link link-adopted tree-' + idx : 'link link-real tree-' + idx)
        .attr('d', d => `M${o.x},${o.y} V${o.y} H${o.x} V${o.y}`);

      const linkUpdate = linkEnter.merge(link).transition().duration(dur)
        .attr('d', d => {
          const sy = d.source.y + 70, ty = d.target.y - 70, my = (sy + ty) / 2;
          return `M${d.source.x},${sy}V${my}H${d.target.x}V${ty}`;
        });

      const linkExit = link.exit().transition().duration(dur)
        .attr('d', d => `M${o.x},${o.y} V${o.y} H${o.x} V${o.y}`).remove();

      g.selectAll('path.sp-link.tree-' + idx).remove();
      nodes.forEach(d => {
        if (d.data.sp && d.data.sp.length > 0) {
          d.data.sp.forEach((sp, i) => {
            const cls = sp.t === '正室' ? 'link-marriage-sei' : 'link-marriage-soku';
            g.append('path').attr('class', `sp-link ${cls} tree-${idx}`)
              .attr('d', `M${d.x + 20},${d.y + i * 45 - 20} H${d.x + 50}`);
          });
        }
      });

      nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }

    // Search and detail
    function showDetail(data) {
      state.selected = data;
      updateAll();
      const p = document.getElementById("panel-content");
      let h = `<div class="detail-name">${data.name}</div>`;
      h += `<div class="detail-section"><h3>基本情報</h3>`;
      if (data.sn) h += `<div class="detail-row"><span class="detail-label">将軍</span><span>${ordinal(data.sn)}代</span></div>`;
      if (data.b) h += `<div class="detail-row"><span class="detail-label">生年</span><span>${data.b}年</span></div>`;
      if (data.d) h += `<div class="detail-row"><span class="detail-label">没年</span><span>${data.d}年</span></div>`;
      if (data.b && data.d) h += `<div class="detail-row"><span class="detail-label">享年</span><span>${data.d - data.b}歳</span></div>`;
      if (data.g) h += `<div class="detail-row"><span class="detail-label">性別</span><span>${data.g === "M" ? "男" : "女"}</span></div>`;
      if (data.title) h += `<div class="detail-row"><span class="detail-label">官位</span><span>${data.title}</span></div>`;
      if (data.court) h += `<div class="detail-row"><span class="detail-label">位階</span><span>${data.court}</span></div>`;
      if (data.domain) h += `<div class="detail-row"><span class="detail-label">領地</span><span>${data.domain}</span></div>`;
      if (data.mother) h += `<div class="detail-row"><span class="detail-label">母</span><span>${data.mother}</span></div>`;
      if (data.adopted) h += `<div class="detail-row"><span class="detail-label">養子</span><span>${data.adopted}</span></div>`;
      if (data.note) h += `<div class="detail-row"><span class="detail-label">備考</span><span>${data.note}</span></div>`;
      if (data.ref) h += `<div class="detail-row"><span class="detail-label">参考</span><span><a href="${data.ref}" target="_blank" rel="noopener" style="color:#4a90d9;text-decoration:underline;">${data.ref.replace(/https?:\/\/(ja\.)?wikipedia\.org\/wiki\//, 'Wikipedia: ').replace(/%[0-9A-F]{2}/g, decodeURIComponent)}</a></span></div>`;
      h += `</div>`;
      if (data.sp && data.sp.length > 0) {
        h += `<div class="detail-section"><h3>配偶者</h3>`;
        data.sp.forEach(s => {
          const cls = s.t === "正室" || s.t === "継室" ? "spouse-seishitsu" : "spouse-sokushitsu";
          h += `<div class="spouse-item ${cls}"><strong>${s.name}</strong> (${s.t})${s.note ? " — " + s.note : ""}</div>`;
        });
        h += `</div>`;
      }
      if (data.ch && data.ch.length > 0) {
        h += `<div class="detail-section"><h3>子</h3>`;
        data.ch.forEach(c => { h += `<div class="detail-row"><span>${c.name}</span><span>${c.b || ""}${c.d ? "-" + c.d : ""}</span></div>`; });
        h += `</div>`;
      }
      p.innerHTML = h;
      document.getElementById("detail-panel").classList.add("active");
    }

    document.getElementById("search-input").addEventListener("input", function (e) {
      const q = e.target.value;
      const res = document.getElementById("search-results");
      if (q.length < 1) { res.style.display = "none"; return; }

      const matched = getAllNodes().filter(n => n.data.name.includes(q) || (n.data.note && n.data.note.includes(q))).slice(0, 5);
      if (matched.length > 0) {
        res.innerHTML = matched.map(n => `<div class="search-item" data-id="${n.data.id}">${n.data.name}</div>`).join("");
        res.style.display = "block";
        res.querySelectorAll(".search-item").forEach(el => {
          el.addEventListener("click", function () {
            const id = this.getAttribute("data-id");
            res.style.display = "none";
            document.getElementById("search-input").value = "";
            let targetNode = expandPathTo(id);
            if (targetNode) {
              updateAll(roots[0]);
              setTimeout(() => {
                const tv = typeof targetNode.x === 'number' ? targetNode : { x: 0, y: 0 };
                const t = d3.zoomIdentity.translate(width / 2 - tv.x, height / 3 - tv.y).scale(0.8);
                svg.transition().duration(700).call(zoom.transform, t);
                showDetail(targetNode.data);
              }, 600);
            }
          });
        });
      } else {
        res.style.display = "none";
      }
    });

    document.getElementById("jump-select").addEventListener("change", function () {
      const id = this.value; if (!id) return;
      const targetNode = expandPathTo(id);
      if (targetNode) {
        updateAll(roots[0]);
        setTimeout(() => {
          const tv = typeof targetNode.x === 'number' ? targetNode : { x: 0, y: 0 };
          const t = d3.zoomIdentity.translate(width / 2 - tv.x, height / 3 - tv.y).scale(0.8);
          svg.transition().duration(700).call(zoom.transform, t);
          showDetail(targetNode.data);
        }, 600);
      }
      this.value = "";
    });

    // Recursive collapse/expand logic
    function collapseAllRec(n) {
      if (Array.isArray(n)) { n.forEach(collapseAllRec); return; }
      if (n.children) { n.children.forEach(collapseAllRec); n._ch = n.children; n.children = null; }
    }

    function expandAllRec(n) {
      if (Array.isArray(n)) { n.forEach(expandAllRec); return; }
      if (!n.children && n._ch) { n.children = n._ch; }
      if (n.children) { n.children.forEach(expandAllRec); }
    }

    function findPathRec(n, targetId) {
      if (n.data.id === targetId) return [n];
      var kids = n.children || n._ch || [];
      for (var i = 0; i < kids.length; i++) {
        var p = findPathRec(kids[i], targetId);
        if (p) { p.unshift(n); return p; }
      }
      return null;
    }

    function expandPathTo(id) {
      roots.forEach(r => collapseAllRec(r));
      roots.forEach(r => { r.children = r._ch; }); // expand roots

      let p = null;
      for (const r of roots) {
        p = findPathRec(r, id);
        if (p) break;
      }
      if (p) {
        p.forEach(function (n) { if (!n.children && n._ch) n.children = n._ch; });
        return p[p.length - 1];
      }
      return null;
    }

    document.getElementById("btn-expand-all").addEventListener("click", function () {
      roots.forEach(r => expandAllRec(r));
      updateAll(roots[0]);
      setTimeout(() => {
        const t = d3.zoomIdentity.translate(width / 2 - root.x, 80).scale(0.6);
        svg.transition().duration(700).call(zoom.transform, t);
      }, 600);
    });

    document.getElementById("btn-collapse-all").addEventListener("click", function () {
      roots.forEach(r => { collapseAllRec(r); r.children = r._ch; });
      updateAll(roots[0]);
      setTimeout(() => {
        const t = d3.zoomIdentity.translate(width / 2 - root.x, 80).scale(0.8);
        svg.transition().duration(700).call(zoom.transform, t);
      }, 600);
    });

    // Init
    roots.forEach(r => {
      r.descendants().forEach(function (d) { if (d.depth > 1 && d.children) { d._ch = d.children; d.children = null; } });
    });

    function isAncestorOf(d, id) {
      if (d.data.id === id) return true;
      if (d.children) return d.children.some(c => isAncestorOf(c, id));
      if (d._ch) return d._ch.some(c => isAncestorOf(c, id));
      return false;
    }

    function expandTo(id) {
      let n = null;
      for (const r of roots) {
        n = r.descendants().find(x => x.data.id === id);
        if (n) break;
      }
      if (!n) {
        roots.forEach(r => {
          r.descendants().forEach(d => { if (d._ch && !d.children) { d.children = d._ch; } });
        });
        for (const r of roots) {
          n = r.descendants().find(x => x.data.id === id);
          if (n) break;
        }
        if (n) {
          let p = n.parent;
          while (p) { if (!p.children && p._ch) p.children = p._ch; p = p.parent; }
        }
        roots.forEach(r => {
          r.descendants().forEach(d => { if (d.depth > 1 && d.children && !isAncestorOf(d, id)) { d._ch = d.children; d.children = null; } });
        });
      }
    }

    expandTo("ieyasu");
    expandTo("kamatari"); // Default expand Fujiwara partially

    expandPathTo("ieyasu");

    roots.forEach(r => { r.x0 = 0; r.y0 = 0; });
    updateAll(roots[0]);

    // Ensure valid non-NaN coordinates for initial transform
    const validNodes = root.descendants().filter(d => typeof d.x === 'number' && typeof d.y === 'number');
    const tCenter = validNodes.find(d => d.data.id === 'tenji') || validNodes[0] || { x: 0, y: 0 };

    const validOffset = {
      x: isNaN(tCenter.x) ? 0 : tCenter.x,
      y: isNaN(tCenter.y) ? 0 : tCenter.y
    };

    const initT = d3.zoomIdentity.translate(width / 2 - validOffset.x, height / 2 - validOffset.y).scale(0.8);
    svg.call(zoom.transform, initT);

  </script>
</body>
